<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
</head>
<body>
    <div id="container">
        <div id="side-nav">
            <h1>HassaanN08's To Do App</h1>
            <div id="add-task">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path fill="currentColor" fill-rule="evenodd" d="M12 23c6.075 0 11-4.925 11-11S18.075 1 12 1 1 5.925 1 12s4.925 11 11 11m-.711-16.5a.75.75 0 1 1 1.5 0v4.789H17.5a.75.75 0 0 1 0 1.5h-4.711V17.5a.75.75 0 0 1-1.5 0V12.79H6.5a.75.75 0 1 1 0-1.5h4.789z" clip-rule="evenodd"></path></svg>
                <h4>Add task</h4>
            </div>
            <dialog id="add-task-dialog" closedby="any">
                <form action="" id="add-task-form" class="add-task-form">
                    <fieldset>
                        <input name="title" type="text" placeholder="Title" required>
                        <textarea name="description" id="" placeholder="Description"></textarea>
                    </fieldset>
                    <fieldset>
                        <div>
                            <label for="date">Due Date</label>
                            <input id="date" name="date" type="date" placeholder="Due Date" required>
                        </div>
                        <div>
                            <label for="priority">Priority</label>
                            <select name="priority" id="priority" required>
                                <option value="" disabled selected hidden>Select an option</option>
                                <option value="p1">P1</option>
                                <option value="p2">P2</option>
                                <option value="p3">P3</option>
                                <option value="p4">P4</option>
                            </select>
                        </div>
                        <div>
                            <label for="select-project">Which Project do you want to add this task to?</label>
                            <select name="projectId" id="select-project" required>
                                <option value="" disabled selected hidden>Select an option</option>
                            </select>
                        </div>
                    </fieldset>
                    <button type="submit">Done</button>
                    <button type="button" class="cancel-btn">Cancel</button>
                </form>
            </dialog>
            <ul style="list-style-type: none;">
                <li id="today">
                    <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true"><g fill="currentColor" fill-rule="evenodd"><path fill-rule="nonzero" d="M6 4h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2zm0 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1H6zm1 3h10a.5.5 0 1 1 0 1H7a.5.5 0 0 1 0-1z"></path><text font-family="var(--font-family-regular)" font-size="9" transform="translate(4 2)" font-weight="500"><tspan x="8" y="15" text-anchor="middle">17</tspan></text></g></svg>
                    <h5>Today</h5>
                </li>
                <li id="upcoming">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" fill-rule="evenodd" d="M6 4h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2m0 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1zm10 12a1 1 0 1 0 0-2 1 1 0 0 0 0 2m-3-1a1 1 0 1 1-2 0 1 1 0 0 1 2 0m-5 1a1 1 0 1 0 0-2 1 1 0 0 0 0 2m9-5a1 1 0 1 1-2 0 1 1 0 0 1 2 0m-5 1a1 1 0 1 0 0-2 1 1 0 0 0 0 2m-3-1a1 1 0 1 1-2 0 1 1 0 0 1 2 0M7 8a.5.5 0 0 0 0 1h10a.5.5 0 0 0 0-1z" clip-rule="evenodd"></path></svg>
                    <h5>Upcoming</h5>
                </li>
                <li id="completed">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" fill-rule="evenodd" d="M12 21.001a9 9 0 1 0 0-18 9 9 0 0 0 0 18m0-1a8 8 0 1 1 0-16 8 8 0 0 1 0 16m-4.354-8.104a.5.5 0 0 1 .708 0l2.146 2.147 5.146-5.147a.5.5 0 0 1 .708.708l-5.5 5.5a.5.5 0 0 1-.708 0l-2.5-2.5a.5.5 0 0 1 0-.708" clip-rule="evenodd"></path></svg>
                    <h5>Completed</h5>
                </li>
            </ul>
            <div class="projects">
                <div>
                    <h4>My Projects</h4>
                    <button id="add-project">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                            <path fill="currentColor" fill-rule="evenodd" d="M12 6a.46.46 0 0 0-.461.462v5.077H6.462a.462.462 0 1 0 0 .922h5.077v5.077a.461.461 0 1 0 .922 0v-5.077h5.077a.461.461 0 1 0 0-.922h-5.077V6.462A.46.46 0 0 0 12 6" clip-rule="evenodd"></path>
                        </svg>
                    </button>
                    <dialog id="add-project-dialog" closedby="any">
                        <form action="" id="add-project-form">
                            <fieldset>
                                <input name="title" type="text" placeholder="Title" required>
                            </fieldset>
                            <button type="submit">Create Project</button>
                            <button type="button" class="cancel-btn">Cancel</button>
                        </form>
                    </dialog>
                </div>
                <ul id="project-list"></ul>
            </div>
        </div>
        <div id="content"></div>
    </div>
</body>
</html>
